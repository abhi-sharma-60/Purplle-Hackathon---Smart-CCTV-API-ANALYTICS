version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      # Persistent local storage for CCTV video uploads and system databases
      - ./backend/uploads:/app/uploads
      - ./backend/retail_analytics.db:/app/retail_analytics.db
      # Mount sample CCTV files from root to container for offline processing
      - ./mall_counting.mp4:/app/mall_counting.mp4
      - ./highway_car.mp4:/app/highway_car.mp4
      - ./highway_car2.mp4:/app/highway_car2.mp4
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped
